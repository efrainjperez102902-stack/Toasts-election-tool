<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toast's Little Election Tool</title>
  <style>
    :root {
      --bg: #eee6d9;
      --bg-strong: #e5d7c5;
      --panel: rgba(255, 251, 244, 0.82);
      --panel-strong: rgba(255, 251, 244, 0.94);
      --ink: #231a14;
      --muted: #6f6256;
      --line: rgba(60, 40, 20, 0.14);
      --shadow: 0 24px 50px rgba(49, 29, 14, 0.12);
      --dem-2: #6990ff;
      --dem-4: #1f52ea;
      --rep-3: #f73357;
      --rep-4: #e70835;
      --accent: #c88b2d;
      --state-default: #d7cec3;
      --state-hover: #c4b8aa;
      --state-active: #4270f8;
      --state-active-hover: #1f52ea;
      --state-blue: #4169e1;
      --state-blue-hover: #274fc8;
      --state-red: #c53b4d;
      --state-red-hover: #9d2235;
      --state-yellow: #d8b229;
      --state-yellow-hover: #b79014;
      --state-border: rgba(60, 40, 20, 0.22);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      color: var(--ink);
      font-family: "Bahnschrift", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.66), transparent 35%),
        linear-gradient(135deg, rgba(179, 209, 255, 0.2), transparent 36%),
        linear-gradient(220deg, rgba(247, 51, 87, 0.14), transparent 28%),
        repeating-linear-gradient(
          90deg,
          rgba(35, 26, 20, 0.035) 0,
          rgba(35, 26, 20, 0.035) 1px,
          transparent 1px,
          transparent 96px
        ),
        linear-gradient(180deg, #f4eee6 0%, var(--bg) 40%, var(--bg-strong) 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1200px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
    }

    /* ── hero ── */
    .hero {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }

    .eyebrow {
      margin: 0 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .hero h1 {
      margin: 0 0 0.6rem;
      font-family: "Rockwell", "Cambria", serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 0.95;
    }

    .hero__lede {
      margin: 0 auto;
      max-width: 52ch;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.55;
    }

    /* ── map panel ── */
    .map-panel {
      margin-top: 1.75rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .map-panel::before {
      content: "";
      position: absolute;
      inset: -20% auto auto -5%;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(231, 8, 53, 0.1), rgba(231, 8, 53, 0) 70%);
      pointer-events: none;
    }

    .map-panel::after {
      content: "";
      position: absolute;
      inset: auto -6% -40% auto;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(31, 82, 234, 0.12), rgba(31, 82, 234, 0) 72%);
      pointer-events: none;
    }

    .map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      position: relative;
      z-index: 1;
    }

    .map-header h2 {
      margin: 0;
      font-family: "Rockwell", "Cambria", serif;
      font-size: 1.3rem;
    }

    .map-hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #us-map {
      width: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    #us-map svg {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(0 12px 28px rgba(35, 26, 20, 0.1));
    }

    /* ── state paths ── */
    .state-path {
      fill: var(--state-blue);
      stroke: #000;
      stroke-width: 0.5px;
      transition: fill 140ms ease;
      cursor: default;
    }

    .state-path.state-path--red {
      fill: var(--state-red);
    }

    .state-path.state-path--yellow {
      fill: var(--state-yellow);
    }

    .state-path.has-sim {
      cursor: pointer;
    }

    .state-path.state-path--blue.has-sim:hover {
      fill: var(--state-blue-hover);
    }

    .state-path.state-path--red.has-sim:hover {
      fill: var(--state-red-hover);
    }

    .state-path.state-path--yellow.has-sim:hover {
      fill: var(--state-yellow-hover);
    }

    /* ── tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0.6rem 0.9rem;
      font-size: 0.88rem;
      box-shadow: 0 8px 24px rgba(35, 26, 20, 0.14);
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 100;
      max-width: 200px;
    }

    #tooltip.visible { opacity: 1; }

    #tooltip .tt-name {
      font-weight: 700;
      margin-bottom: 0.2rem;
    }

    #tooltip .tt-status {
      color: var(--muted);
      font-size: 0.82rem;
    }

    #tooltip .tt-status.ready {
      color: var(--dem-4);
      font-weight: 600;
    }

    /* ── legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1rem;
      position: relative;
      z-index: 1;
    }

    .legend__chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.36rem 0.64rem;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.06);
      font-size: 0.84rem;
      background: rgba(255, 255, 255, 0.55);
    }

    .legend__chip::before {
      content: "";
      width: 0.68rem; height: 0.68rem;
      border-radius: 50%;
    }

    .legend__chip--ready::before  { background: #aec4ff; }
    .legend__chip--coming::before { background: var(--state-default); }

    /* ── states grid (below map) ── */
    .states-section {
      margin-top: 1.5rem;
    }

    .states-section h3 {
      font-family: "Rockwell", "Cambria", serif;
      font-size: 1.1rem;
      margin: 0 0 0.9rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.78rem;
    }

    .states-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.65rem;
    }

    .state-card {
      padding: 0.8rem 1rem;
      border-radius: 18px;
      border: 1px solid rgba(46, 29, 14, 0.09);
      background: var(--panel-strong);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--ink);
      transition: transform 150ms ease, box-shadow 150ms ease, border-color 150ms ease;
    }

    .state-card.ready {
      background: linear-gradient(135deg, rgba(66,112,248,0.1), rgba(255,255,255,0.92));
      border-color: rgba(66,112,248,0.22);
      cursor: pointer;
    }

    .state-card.ready:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(31, 82, 234, 0.14);
      border-color: rgba(66,112,248,0.4);
    }

    .state-card.coming {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .state-card__name {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .state-card__badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.45rem;
      border-radius: 999px;
    }

    .state-card.ready .state-card__badge {
      background: rgba(66, 112, 248, 0.14);
      color: var(--dem-4);
    }

    .state-card.coming .state-card__badge {
      background: rgba(0,0,0,0.06);
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .map-header { flex-direction: column; align-items: flex-start; }
      .states-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <p class="eyebrow">State-by-State</p>
      <h1>toast's little election tool</h1>
      <p class="hero__lede">pick a state to explore electoral outcomes and stress test your most wild elections</p>
    </div>

    <div class="map-panel">
      <div class="map-header">
        <h2>Select a State</h2>
        <p class="map-hint">Highlighted states have a simulator ready to go.</p>
      </div>

      <div id="us-map"></div>

    </div>

    <div class="states-section">
      <h3>All States</h3>
      <div class="states-grid" id="states-grid"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="tt-name"></div>
    <div class="tt-status"></div>
  </div>

  <!-- local TopoJSON data (avoids CORS when opened from file://) -->
  <script src="us-states-data.js"></script>
  <script src="greenland-data.js"></script>
  <!-- D3 + TopoJSON from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

  <script>
    (function () {
      "use strict";

      // ── simulators that exist ──────────────────────────────────────────────
      // key = FIPS code (zero-padded string), value = relative URL
      var SIMULATORS = {
        "01": "alabama.html",    // Alabama
        "02": "alaska.html",     // Alaska
        "04": "arizona.html",    // Arizona
        "06": "california.html", // California
        "11": "dc.html",         // District of Columbia
        "12": "florida.html",    // Florida
        "13": "georgia.html",    // Georgia
        "32": "nevada.html",     // Nevada
        "35": "new-mexico.html", // New Mexico
        "40": "oklahoma.html",   // Oklahoma
        "45": "south-carolina.html", // South Carolina
        "46": "south-dakota.html", // South Dakota
        "53": "washington.html", // Washington
        "48": "texas.html",      // Texas
        "16": "idaho.html",      // Idaho
        "17": "illinois.html",   // Illinois
        "18": "indiana.html",    // Indiana
        "23": "maine.html",      // Maine
        "36": "new-york.html",       // New York
        "37": "north-carolina.html", // North Carolina
        "38": "north-dakota.html", // North Dakota
        "39": "ohio.html",       // Ohio
        "08": "colorado.html",   // Colorado
        "19": "iowa.html",       // Iowa
        "05": "arkansas.html",   // Arkansas
        "20": "kansas.html",      // Kansas
        "29": "missouri.html",    // Missouri
        "30": "montana.html",     // Montana
        "31": "nebraska.html",    // Nebraska
        "21": "kentucky.html",    // Kentucky
        "22": "louisiana.html",   // Louisiana
        "24": "maryland.html",   // Maryland
        "26": "michigan.html",   // Michigan
        "27": "minnesota.html",  // Minnesota
        "28": "mississippi.html", // Mississippi
        "42": "pennsylvania.html", // Pennsylvania
        "47": "tennessee.html",    // Tennessee
        "49": "utah.html",       // Utah
        "51": "virginia.html",   // Virginia
        "54": "west-virginia.html", // West Virginia
        "55": "wisconsin.html",  // Wisconsin
        "56": "wyoming.html",    // Wyoming
        "72": "puerto-rico.html", // Puerto Rico
        "34": "new-jersey.html", // New Jersey
        "09": "connecticut.html", // Connecticut
        "10": "delaware.html",  // Delaware
        "25": "massachusetts.html", // Massachusetts
        "41": "oregon.html",        // Oregon
        "44": "rhode-island.html", // Rhode Island
        "15": "hawaii.html",       // Hawaii
        "50": "vermont.html",      // Vermont
        "33": "new-hampshire.html" // New Hampshire
      };

      var RED_STATES = {
        "01": true, // Alabama
        "02": true, // Alaska
        "04": true, // Arizona
        "05": true, // Arkansas
        "12": true, // Florida
        "13": true, // Georgia
        "16": true, // Idaho
        "18": true, // Indiana
        "19": true, // Iowa
        "20": true, // Kansas
        "21": true, // Kentucky
        "22": true, // Louisiana
        "26": true, // Michigan
        "28": true, // Mississippi
        "29": true, // Missouri
        "30": true, // Montana
        "31": true, // Nebraska
        "32": true, // Nevada
        "37": true, // North Carolina
        "38": true, // North Dakota
        "39": true, // Ohio
        "40": true, // Oklahoma
        "42": true, // Pennsylvania
        "45": true, // South Carolina
        "46": true, // South Dakota
        "47": true, // Tennessee
        "48": true, // Texas
        "49": true, // Utah
        "54": true, // West Virginia
        "55": true, // Wisconsin
        "56": true  // Wyoming
      };

      function stateColorClass(fips) {
        if (fips === "72") {
          return "yellow";
        }
        return RED_STATES[fips] ? "red" : "blue";
      }

      // ── all 50 states + DC ────────────────────────────────────────────────
      var ALL_STATES = [
        { fips: "01", name: "Alabama" },
        { fips: "02", name: "Alaska" },
        { fips: "04", name: "Arizona" },
        { fips: "05", name: "Arkansas" },
        { fips: "06", name: "California" },
        { fips: "08", name: "Colorado" },
        { fips: "09", name: "Connecticut" },
        { fips: "10", name: "Delaware" },
        { fips: "11", name: "District of Columbia" },
        { fips: "12", name: "Florida" },
        { fips: "13", name: "Georgia" },
        { fips: "15", name: "Hawaii" },
        { fips: "16", name: "Idaho" },
        { fips: "17", name: "Illinois" },
        { fips: "18", name: "Indiana" },
        { fips: "19", name: "Iowa" },
        { fips: "20", name: "Kansas" },
        { fips: "21", name: "Kentucky" },
        { fips: "22", name: "Louisiana" },
        { fips: "23", name: "Maine" },
        { fips: "24", name: "Maryland" },
        { fips: "25", name: "Massachusetts" },
        { fips: "26", name: "Michigan" },
        { fips: "27", name: "Minnesota" },
        { fips: "28", name: "Mississippi" },
        { fips: "29", name: "Missouri" },
        { fips: "30", name: "Montana" },
        { fips: "31", name: "Nebraska" },
        { fips: "32", name: "Nevada" },
        { fips: "33", name: "New Hampshire" },
        { fips: "34", name: "New Jersey" },
        { fips: "35", name: "New Mexico" },
        { fips: "36", name: "New York" },
        { fips: "37", name: "North Carolina" },
        { fips: "38", name: "North Dakota" },
        { fips: "39", name: "Ohio" },
        { fips: "40", name: "Oklahoma" },
        { fips: "41", name: "Oregon" },
        { fips: "42", name: "Pennsylvania" },
        { fips: "44", name: "Rhode Island" },
        { fips: "45", name: "South Carolina" },
        { fips: "46", name: "South Dakota" },
        { fips: "47", name: "Tennessee" },
        { fips: "48", name: "Texas" },
        { fips: "49", name: "Utah" },
        { fips: "50", name: "Vermont" },
        { fips: "51", name: "Virginia" },
        { fips: "53", name: "Washington" },
        { fips: "54", name: "West Virginia" },
        { fips: "55", name: "Wisconsin" },
        { fips: "56", name: "Wyoming" },
        { fips: "72", name: "Puerto Rico" }
      ];

      // ── build SVG map ─────────────────────────────────────────────────────
      var topo = window.US_STATES_TOPO;
      var states = topojson.feature(topo, topo.objects.states);

      var projection = d3.geoAlbersUsa()
        .fitSize([960, 600], states);

      var path = d3.geoPath().projection(projection);

      var svg = d3.select("#us-map")
        .append("svg")
        .attr("viewBox", "0 0 960 600")
        .attr("aria-label", "United States map");

      // state fills
      svg.append("g")
        .selectAll("path")
        .data(states.features)
        .join("path")
        .attr("class", function (d) {
          return "state-path state-path--" + stateColorClass(d.id) + (SIMULATORS[d.id] ? " has-sim" : "");
        })
        .attr("d", path)
        .attr("aria-label", function (d) { return d.properties.name; })
        .on("mouseenter", onStateEnter)
        .on("mousemove",  onStateMove)
        .on("mouseleave", onStateLeave)
        .on("click", onStateClick);

      // state borders (mesh)
      svg.append("path")
        .datum(topojson.mesh(topo, topo.objects.states, function (a, b) { return a !== b; }))
        .attr("fill", "none")
        .attr("stroke", "rgba(0,0,0,0.35)")
        .attr("stroke-width", "0.5")
        .attr("d", path);

      // ── Puerto Rico inset ─────────────────────────────────────────────────
      var prFeature = states.features.find(function (d) { return d.id === "72"; });
      if (prFeature) {
        // Position inset: lower-right, just below and right of Florida
        var prWidth  = 130;
        var prHeight = 70;
        var prX      = 850;
        var prY      = 510;

        var prProjection = d3.geoMercator()
          .fitSize([prWidth, prHeight], prFeature);
        var prPath = d3.geoPath().projection(prProjection);

        var prGroup = svg.append("g")
          .attr("transform", "translate(" + prX + "," + prY + ")");

        // label
        prGroup.append("text")
          .attr("x", prWidth / 2)
          .attr("y", prHeight + 13)
          .attr("text-anchor", "middle")
          .attr("font-size", "9px")
          .attr("fill", "rgba(35,26,20,0.55)")
          .attr("font-family", "Bahnschrift, Trebuchet MS, sans-serif")
          .text("PUERTO RICO");

        // shape
        prGroup.append("path")
          .datum(prFeature)
          .attr("class", function (d) {
            return "state-path state-path--" + stateColorClass(d.id) + (SIMULATORS[d.id] ? " has-sim" : "");
          })
          .attr("d", prPath)
          .on("mouseenter", onStateEnter)
          .on("mousemove",  onStateMove)
          .on("mouseleave", onStateLeave)
          .on("click", onStateClick);
      }

      // ── Greenland inset ──────────────────────────────────────────────────
      var greenlandGeo = window.GREENLAND_GEOJSON;
      var greenlandGroup = null;
      if (greenlandGeo) {
        var greenlandWidth = 92;
        var greenlandHeight = 138;
        var greenlandX = 736;
        var greenlandY = 12;

        var greenlandProjection = d3.geoMercator()
          .fitSize([greenlandWidth, greenlandHeight], greenlandGeo);
        var greenlandPath = d3.geoPath().projection(greenlandProjection);

        greenlandGroup = svg.append("g")
          .attr("transform", "translate(" + greenlandX + "," + greenlandY + ")")
          .attr("pointer-events", "all");

        greenlandGroup.append("path")
          .datum(greenlandGeo.features[0])
          .attr("d", greenlandPath)
          .attr("fill", "#dcecf3")
          .attr("stroke", "#000")
          .attr("stroke-width", 1.1)
          .attr("stroke-linejoin", "round");

        greenlandGroup.append("text")
          .attr("x", greenlandWidth / 2)
          .attr("y", greenlandHeight + 12)
          .attr("text-anchor", "middle")
          .attr("font-size", "9px")
          .attr("fill", "rgba(35,26,20,0.55)")
          .attr("font-family", "Bahnschrift, Trebuchet MS, sans-serif")
          .text("GREENLAND");
      }

      // ── tooltip ───────────────────────────────────────────────────────────
      var tooltip   = document.getElementById("tooltip");
      var ttName    = tooltip.querySelector(".tt-name");
      var ttStatus  = tooltip.querySelector(".tt-status");

      function onStateEnter(event, d) {
        var name = d.properties.name;
        var sim  = SIMULATORS[d.id];
        ttName.textContent   = name;
        ttStatus.textContent = sim ? "Click to open simulator" : "Coming soon";
        ttStatus.className   = "tt-status" + (sim ? " ready" : "");
        tooltip.classList.add("visible");
        moveTooltip(event);
      }

      function onStateMove(event) {
        moveTooltip(event);
      }

      function onStateLeave() {
        tooltip.classList.remove("visible");
      }

      function moveTooltip(event) {
        var x = event.clientX + 14;
        var y = event.clientY + 14;
        // keep inside viewport
        if (x + 210 > window.innerWidth)  x = event.clientX - 220;
        if (y + 70  > window.innerHeight) y = event.clientY - 80;
        tooltip.style.left = x + "px";
        tooltip.style.top  = y + "px";
      }

      function onStateClick(event, d) {
        var sim = SIMULATORS[d.id];
        if (sim) window.location.href = sim;
      }

      if (greenlandGroup) {
        greenlandGroup
          .style("cursor", "pointer")
          .on("mouseenter", function (event) {
            ttName.textContent = "Greenland";
            ttStatus.textContent = "Click to open simulator";
            ttStatus.className = "tt-status ready";
            tooltip.classList.add("visible");
            moveTooltip(event);
          })
          .on("mousemove", function (event) {
            moveTooltip(event);
          })
          .on("mouseleave", function () {
            tooltip.classList.remove("visible");
          })
          .on("click", function () {
            window.location.href = "greenland.html";
          });
      }

      // ── states grid ───────────────────────────────────────────────────────
      var grid = document.getElementById("states-grid");

      ALL_STATES.forEach(function (s) {
        var sim   = SIMULATORS[s.fips];
        var el    = document.createElement(sim ? "a" : "div");
        el.className = "state-card " + (sim ? "ready" : "coming");

        var nameEl = document.createElement("span");
        nameEl.className = "state-card__name";
        nameEl.textContent = s.name;

        var badgeEl = document.createElement("span");
        badgeEl.className = "state-card__badge";
        badgeEl.textContent = sim ? "Ready" : "Soon";

        el.appendChild(nameEl);
        el.appendChild(badgeEl);

        if (sim) {
          el.href = sim;
        }

        grid.appendChild(el);
      });

      var greenlandCard = document.createElement("a");
      greenlandCard.className = "state-card ready";
      greenlandCard.href = "greenland.html";
      greenlandCard.innerHTML =
